name: Deploy Demo Web

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch or ref to deploy
        required: true
        default: main
      requirement_id:
        description: solo-lab requirement id for callback
        required: false
        default: ""
      callback_url:
        description: Public solo-lab callback base URL
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-solo-lab:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve callback context
        id: context
        env:
          INPUT_CALLBACK_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.callback_url || '' }}
          INPUT_REQUIREMENT_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.requirement_id || '' }}
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = '.solo-lab/deploy-context.json'
          const outputFile = process.env.GITHUB_OUTPUT

          let callbackUrl = process.env.INPUT_CALLBACK_URL || ''
          let requirementId = process.env.INPUT_REQUIREMENT_ID || ''

          if (fs.existsSync(path)) {
            const parsed = JSON.parse(fs.readFileSync(path, 'utf8'))
            callbackUrl = callbackUrl || parsed.callbackUrl || ''
            requirementId = requirementId || parsed.requirementId || ''
          }

          const lines = [
            `callback_url=${callbackUrl}`,
            `requirement_id=${requirementId}`,
            `present=${callbackUrl && requirementId ? 'true' : 'false'}`
          ]

          fs.appendFileSync(outputFile, `${lines.join('\n')}\n`)
          NODE

      - name: Notify success callback
        if: ${{ steps.context.outputs.present == 'true' }}
        env:
          CALLBACK_URL: ${{ steps.context.outputs.callback_url }}
          REQUIREMENT_ID: ${{ steps.context.outputs.requirement_id }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat > payload.json <<EOF
          {
            "source": "external_ci",
            "status": "ready",
            "url": "${PAGE_URL}",
            "commitSha": "${GITHUB_SHA}",
            "buildLogUrl": "${RUN_URL}"
          }
          EOF
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-Type: application/json' \
            "$CALLBACK_URL/requirements/$REQUIREMENT_ID/environments/callback" \
            --data @payload.json
